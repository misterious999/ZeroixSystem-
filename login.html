<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZeroixDark Ptero</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/config.js"></script>
    <style>
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, rgba(56,189,248,0.1), transparent 40%), radial-gradient(circle at bottom left, rgba(124,58,237,0.1), transparent 40%); }
        .login-card { width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card login-card">
            <i data-lucide="zap" class="text-cyan" style="width: 48px; height: 48px; margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 5px;">Masuk ke Panel</h2>
            <p class="text-muted" style="margin-bottom: 30px;">Kelola server ZeroixDark Ptero kamu</p>
            
            <form id="login-form" style="text-align: left;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="btn-login">Masuk <i data-lucide="arrow-right"></i></button>
            </form>
            <div style="margin-top: 20px;">
                <a href="index.html" class="text-muted" style="font-size: 0.9rem;">&larr; Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <!-- Modul Firebase wajib diload -->
    <script type="module" src="js/firebase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i data-lucide="loader" class="spin"></i> Memproses...';
            btn.disabled = true;
            try {
                // Tunggu firebaseAPI ready
                while(!window.firebaseAPI) { await new Promise(r => setTimeout(r, 100)); }
                await window.auth.login(document.getElementById('username').value, document.getElementById('password').value);
            } finally {
                btn.innerHTML = 'Masuk <i data-lucide="arrow-right"></i>';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
